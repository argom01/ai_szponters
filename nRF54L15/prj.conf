# DEBUG: parametr do logów czujników na serial monitor
CONFIG_LOG_SENSORS=y

# Podstawowa konfiguracja sprzętu
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_ADC=y
CONFIG_BME280=y
CONFIG_VL53L0X=y
CONFIG_LOG=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Bluetooth LE - Tryb Peryferyjny (Serwer)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF54L15"
CONFIG_BT_DEVICE_APPEARANCE=0

# NFC Type 2 Tag - URI redirect
CONFIG_NFC_T2T_NRFXLIB=y
CONFIG_NFC_NDEF=y
CONFIG_NFC_NDEF_MSG=y
CONFIG_NFC_NDEF_RECORD=y
CONFIG_NFC_NDEF_URI_MSG=y
CONFIG_NFC_NDEF_URI_REC=y

# Zwiększona pamięć dla stosu BT (dla bezpieczeństwa)
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048